name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main # Executa sempre que você enviar alterações para a branch main

# Define as permissões necessárias para o token do GitHub Actions realizar o deploy
permissions:
  contents: read
  pages: write
  id-token: write

# Permite apenas um deploy simultâneo, cancelando execuções anteriores em andamento
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Instalar Dependências
        run: npm install

      - name: Compilar Projeto (Build)
        run: npm run build

      - name: Upload do Artefato do GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: './docs'

      - name: Implantar no GitHub Pages (Deploy)
        id: deployment
        uses: actions/deploy-pages@v4
